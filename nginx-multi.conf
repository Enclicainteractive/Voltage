worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 2048;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  upstream voltage_api {
    least_conn;
    server voltage-api:5000 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream voltage_websocket {
    ip_hash;
    server voltage-websocket:5001 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream voltage_federation {
    server voltage-federation:5002 weight=3 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  upstream voltage_cdn {
    server voltage-cdn:5003 weight=3 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  upstream voltage_worker {
    server voltage-worker:5004 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 8;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 0;
    client_body_timeout 30s;
    client_header_timeout 30s;

    limit_req zone=api_limit burst=50 nodelay;
    limit_conn conn_limit 100;

    location / {
      proxy_pass http://voltage_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Cluster-Client-IP $remote_addr;
      proxy_cache_bypass $http_upgrade;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    location /api {
      proxy_pass http://voltage_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Cluster-Client-IP $remote_addr;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    location /api/auth {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://voltage_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    location /uploads {
      proxy_pass http://voltage_cdn;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    location /socket.io {
      proxy_pass http://voltage_websocket;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Cluster-Client-IP $remote_addr;
      
      proxy_connect_timeout 7s;
      proxy_send_timeout 10s;
      proxy_read_timeout 86400;
      
      proxy_buffering off;
      proxy_http_version 1.1;
    }

    location /federation {
      proxy_pass http://voltage_federation;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      proxy_connect_timeout 15s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    location /health {
      proxy_pass http://voltage_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      
      proxy_connect_timeout 5s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      
      access_log off;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
      internal;
    }
  }
}
